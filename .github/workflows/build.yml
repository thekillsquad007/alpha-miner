name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04]
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          # OpenCL headers optional; we vendor CL headers for Windows, use system on Linux if present
          sudo apt-get install -y ocl-icd-opencl-dev opencl-headers || true

      - name: Configure & build (CPU + OpenCL if available)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DALPHA_MINER_HIP=OFF \
            -DALPHA_MINER_CUDA=OFF \
            -DALPHA_MINER_OPENCL=ON
          cmake --build build -j$(nproc)

      - name: Smoke test
        run: |
          ./build/alpha-miner -h
          ./build/alpha-miner -b cpu -t 2 -o 127.0.0.1:9 -u test || true

      - name: Package
        run: |
          OS_TAG="${{ matrix.os }}"
          mkdir -p dist
          cp build/alpha-miner "dist/alpha-miner-${OS_TAG}-x64"
          cp kernels/blake3_an.cl dist/
          (cd dist && tar czf "alpha-miner-${OS_TAG}-x64.tar.gz" "alpha-miner-${OS_TAG}-x64" blake3_an.cl)

      - uses: actions/upload-artifact@v4
        with:
          name: alpha-miner-${{ matrix.os }}-x64
          path: dist/alpha-miner-*.tar.gz

  windows:
    name: Windows MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build OpenCL import lib
        shell: cmd
        run: |
          if not exist third_party\OpenCL\lib mkdir third_party\OpenCL\lib
          dumpbin /exports C:\Windows\System32\OpenCL.dll > third_party\OpenCL\lib\exports_raw.txt
          python -c "import re,pathlib; t=pathlib.Path('third_party/OpenCL/lib/exports_raw.txt').read_text(errors='ignore'); names=re.findall(r'\\s+\\d+\\s+[0-9A-Fa-f]+\\s+[0-9A-Fa-f]+\\s+(cl\\w+)', t); pathlib.Path('third_party/OpenCL/lib/OpenCL.def').write_text('LIBRARY OpenCL\\nEXPORTS\\n'+'\\n'.join('    '+n for n in names))"
          lib /def:third_party\OpenCL\lib\OpenCL.def /out:third_party\OpenCL\lib\OpenCL.lib /machine:x64

      - name: CMake configure & build
        shell: cmd
        run: |
          cmake -S . -B build-win -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DALPHA_MINER_HIP=OFF -DALPHA_MINER_CUDA=OFF -DALPHA_MINER_OPENCL=ON
          cmake --build build-win --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build-win\alpha-miner.exe dist\alpha-miner-windows-x64.exe
          Copy-Item kernels\blake3_an.cl dist\
          Copy-Item scripts\mine-rplant.bat dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\alpha-miner-windows-x64.exe,dist\blake3_an.cl -DestinationPath dist\alpha-miner-windows-x64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: alpha-miner-windows-x64
          path: dist/alpha-miner-windows-x64.zip
