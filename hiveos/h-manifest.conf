#!/usr/bin/env bash
# HiveOS custom miner name — MUST match directory name inside the tarball.
CUSTOM_NAME=alpha

# Version: <miner semver>.<wrapper rev>
CUSTOM_VERSION=0.2.3.01

CUSTOM_CONFIG_FILENAME=/hive/miners/custom/alpha/miner.conf
CUSTOM_LOG_BASENAME=/var/log/miner/custom/alpha

MINER_NAME=$CUSTOM_NAME
MINER_VER=$CUSTOM_VERSION
MINER_CONFIG_FILENAME=$CUSTOM_CONFIG_FILENAME
